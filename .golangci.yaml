linters-settings:
  cyclop:
    max-complexity: 30
    skip-tests: true
  depguard:
    rules:
      main:
        list-mode: strict
        files:
          - $all
          - "!$test"
        allow:
          - $gostd
          - github.com/datasance/potctl
          - github.com/datasance/iofog-go-sdk/v3
          - github.com/datasance/iofog-operator
          - github.com/spf13/cobra
          - github.com/mitchellh/go-homedir
          - github.com/pkg
          - github.com/twmb/algoimpl
          - github.com/containers/image
          - github.com/opencontainers/go-digest
          - github.com/gorilla/websocket
          - github.com/vmihailenco/msgpack
          - github.com/docker
          - k8s.io
          - sigs.k8s.io/controller-runtime
          - github.com/GeertJohan/go.rice
          - github.com/briandowns/spinner
  dupl:
    threshold: 100
  funlen:
    lines: 250
    statements: 100
  goconst:
    min-len: 2
    min-occurrences: 5
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport # https://github.com/go-critic/go-critic/issues/845
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc
  gocognit:
    # minimal code complexity to report, 30 by default (but we recommend 10-20)
    min-complexity: 30
  gocyclo:
    min-complexity: 30
  godox:
    # Report any comments starting with keywords, this is useful for TODO or FIXME comments that
    # might be left in the code accidentally and should be resolved before merging.
    # Default: ["TODO", "BUG", "FIXME"]
    keywords:
      - TODO
      - BUG
      - FIXME
  gofmt:
    # Simplify code: gofmt with `-s` option.
    # Default: true
    simplify: true
    # Apply the rewrite rules to the source before reformatting.
    # https://pkg.go.dev/cmd/gofmt
    # Default: []
    rewrite-rules:
      - pattern: 'interface{}'
        replacement: 'any'
      - pattern: 'a[b:len(a)]'
        replacement: 'a[b:]'
  goimports:
  #    local-prefixes: github.com/golangci/golangci-lint
  gomnd:
    settings:
      mnd:
        # don't include the "operation" and "assign"
        checks: argument,case,condition,return
  govet:
    check-shadowing: false
    settings:
      printf:
        funcs:
  lll:
    line-length: 180
  maligned:
    suggest-new: true
  misspell:
    locale: US
  nestif:
    min-complexity: 10

  varnamelen:
    # The longest distance, in source lines, that is being considered a "small scope".
    # Variables used in at most this many lines will be ignored.
    # Default: 5
    max-distance: 50
    # The minimum length of a variable's name that is considered "long".
    # Variable names that are at least this long will be ignored.
    # Default: 3
    min-name-length: 2

issues:
  # Excluding configuration per-path, per-linter, per-text and per-source
  exclude-rules:
    - path: _test\.go
      linters:
        - gomnd
        - lll
        - maligned
        - gocyclo
        - dupl
        - funlen

run:
  skip-files:
    # auto-generated
    - ".*_test.go"




# golangci.com configuration
# https://github.com/golangci/golangci/wiki/Configuration
service:
  golangci-lint-version: 1.64.4 # use the fixed version to not introduce new linters unexpectedly
  prepare:
    - echo "here I can run custom commands, but no preparation needed for this repo"

